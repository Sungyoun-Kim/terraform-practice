environment:
  name: dev

vault:
  server: http://host.docker.internal:8200
  mountPath: secret
  remoteKey: hello-app/dev
  tokenSecretName: vault-token
  tokenSecretKey: token

secretStore:
  name: vault-dev

externalSecret:
  name: hello-app-secret
  refreshInterval: 15s
  targetName: hello-app-secret
