apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-monitoring
  namespace: monitoring-helm
spec:
  provider:
    vault:
      server: http://host.docker.internal:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring-helm
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-monitoring
    kind: SecretStore
  target:
    name: prometheus-stack-grafana-admin
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: admin-user
      remoteRef:
        key: monitoring/grafana-admin
        property: admin-user
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: admin-password
      remoteRef:
        key: monitoring/grafana-admin
        property: admin-password
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
