apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hello-app-secrets-environments
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  generators:
    - list:
        elements:
          - env: dev
            namespace: hello-app-dev
          - env: staging
            namespace: hello-app-staging
          - env: prod
            namespace: hello-app-prod
  template:
    metadata:
      name: hello-app-secrets-{{env}}
    spec:
      project: local-platform
      source:
        repoURL: https://github.com/Sungyoun-Kim/terraform-practice
        targetRevision: main
        path: charts/hello-app-secrets
        helm:
          releaseName: hello-app-secrets-{{env}}
          parameters:
            - name: environment.name
              value: "{{env}}"
            - name: secretStore.name
              value: vault-{{env}}
            - name: vault.remoteKey
              value: hello-app/{{env}}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 1m
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
